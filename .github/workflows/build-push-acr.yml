name: Build and Push to ACR

# Builds the backend + UI images and pushes to Azure Container Registry.
# Uses ACR admin credentials stored as GitHub secrets (no OIDC/App Registration needed).
# Runs on main branch pushes, releases, and manual triggers.

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (default: git SHA short)"
        required: false
        default: ""
      push_latest:
        description: "Also tag as 'latest'"
        required: false
        type: boolean
        default: true

env:
  ACR_LOGIN_SERVER: ailabneurosan-bwggffftfecudhax.azurecr.io
  ACR_REPOSITORY: neurosan
  UI_ACR_REPOSITORY: neurosan-ui
  UI_APP_PATH: ./apps/conscious_assistant

jobs:
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            case "${{ github.event_name }}" in
              release) TAG="${{ github.event.release.tag_name }}" ;;
              *)        TAG="${SHA_SHORT}" ;;
            esac
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${TAG}"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image reference
        run: |
          echo "Backend image pushed:"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"

  build-ui:
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$TAG" ]; then
            case "${{ github.event_name }}" in
              release) TAG="${{ github.event.release.tag_name }}" ;;
              *)        TAG="${SHA_SHORT}" ;;
            esac
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/conscious_assistant/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.UI_ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.UI_ACR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image reference
        run: |
          echo "UI image pushed:"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.UI_ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
