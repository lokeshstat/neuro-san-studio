name: Build and Push to ACR

# Builds the backend image and pushes to Azure Container Registry.
# Runs on main branch pushes, releases, and manual triggers.
# This workflow runs on GitHub-hosted runners (bypasses corporate network ACR restrictions).

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to push (default: git SHA short)"
        required: false
        default: ""
      push_latest:
        description: "Also tag as 'latest'"
        required: false
        type: boolean
        default: true

env:
  # Override these via GitHub repo/environment variables or secrets:
  #   ACR_LOGIN_SERVER  e.g. myregistry.azurecr.io
  #   ACR_REPOSITORY    e.g. neuro-san-studio  (image name inside ACR)
  ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
  ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY || 'neuro-san-studio' }}
  UI_ACR_REPOSITORY: ${{ vars.UI_ACR_REPOSITORY || 'neuro-san-studio-ui' }}

jobs:
  build-backend:
    name: Build & Push Backend Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # needed for OIDC login to Azure
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="${{ github.event.inputs.image_tag || '' }}"
          if [ -z "$TAG" ]; then
            case "${{ github.event_name }}" in
              release) TAG="${{ github.event.release.tag_name }}" ;;
              *)        TAG="${SHA_SHORT}" ;;
            esac
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${TAG}"

      # --- Azure Login via OIDC (recommended — no stored secrets) ---
      # Prerequisites: configure a Federated Identity Credential in your
      # Entra ID App Registration pointing to this repo + branch.
      # Then set these repo secrets/vars:
      #   AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build backend using the production multi-stage Dockerfile
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}/{1}:latest', env.ACR_LOGIN_SERVER, env.ACR_REPOSITORY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_VERSION=${{ steps.tag.outputs.tag }}

      - name: Print image reference
        run: |
          echo "Backend image pushed:"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"

  build-ui:
    name: Build & Push UI Image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        shell: bash
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          TAG="${{ github.event.inputs.image_tag || '' }}"
          if [ -z "$TAG" ]; then
            case "${{ github.event_name }}" in
              release) TAG="${{ github.event.release.tag_name }}" ;;
              *)        TAG="${SHA_SHORT}" ;;
            esac
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_LOGIN_SERVER }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Detect which UI app to build (conscious_assistant or cruse or wwaw)
      # Override UI_APP_PATH via repo variable to select the right UI
      - name: Build and push UI image
        uses: docker/build-push-action@v5
        with:
          context: ${{ vars.UI_APP_PATH || './apps/conscious_assistant' }}
          file: ${{ vars.UI_DOCKERFILE || './Dockerfile' }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.UI_ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}
            ${{ github.event.inputs.push_latest == 'true' && format('{0}/{1}:latest', env.ACR_LOGIN_SERVER, env.UI_ACR_REPOSITORY) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image reference
        run: |
          echo "UI image pushed:"
          echo "  ${{ env.ACR_LOGIN_SERVER }}/${{ env.UI_ACR_REPOSITORY }}:${{ steps.tag.outputs.tag }}"
